system:
  name: akq-agents
  timezone: Asia/Shanghai
  scheduler:
    factor_refresh_minutes: 30
    backtest_refresh_minutes: 120
    portfolio_refresh_minutes: 180
    daily_advice_hour: 8
    daily_advice_minute: 30

universe:
  market: cn
  symbols:
    - "600519"
    - "000001"
    - "300750"
    - "601318"
    - "600036"
  lookback_days: 120

research:
  benchmark: "000300"
  rebalance_frequency: daily
  top_n_factors: 5
  top_n_symbols: 3
  min_sharpe: 0.8
  max_drawdown: 0.25
  min_ic: -1.0

risk:
  max_single_weight: 0.10
  min_single_weight: 0.005
  max_portfolio_size: 50
  # 注意：M7-B 后真正风控由 services/portfolio/risk_filter.py 在 universe 阶段做
  # （新股/停牌/极价/低流动性硬过滤）。此处 min_liquidity_score 仅作 RiskAgent 兜底
  # 软约束；硬过滤已剔除的低流动性票，这里阈值放到 -3.0 让兜底基本不干预。
  min_liquidity_score: -3.0

# ============================================================================
# PortfolioOptimizer 参数 (M25 配置化)
# 位置: src/akq_agents/services/portfolio/optimizer.py::PortfolioOptimizer
# 调用: bootstrap.py::build_services 里从这里读进 OptimizerConfig
#
# 这一段直接决定每日"目标组合" (target weights) 的结构 —
# 改动这里 → 明天的 portfolio_snapshot / trade_list 都会变.
# 建议: 先小步调 turnover_aversion / top_n 观察 1-2 周 paper trading 效果再固化.
# ============================================================================
portfolio:
  # 持仓数上限. 越小组合越集中, 单票 alpha 权重越大, 但个股风险也放大.
  #   - 机构量化常用 50-100
  #   - 散户手工执行建议 20-30 (每天调仓单数可控)
  #   - 生产默认 50
  top_n: 50

  # 单票权重上限 (硬 cap, 超出会 _cap_and_redistribute 迭代削平).
  #   - 0.05 = 单票最多 5% (默认, 集中度适中)
  #   - 0.10 = 更集中, 单票风险大
  #   - 0.02 = 更分散, 类指数增强
  max_single_weight: 0.05

  # 单行业权重上限 (行业中性化, 防扎堆 e.g. 全砸新能源).
  # 按申万一级行业分组, 超出的按比例缩水并分给未达 cap 的行业, 最多迭代 5 次.
  #   - 0.30 = 单行业最多 30% (默认)
  #   - 1.00 = 关闭行业约束 (退化到不行业中性)
  max_industry_weight: 0.30

  # 换手抑制系数. 权重与昨日线性插值: final_w = a * new_w + (1-a) * prev_w.
  # 这是控制换手最直接的杠杆.
  #   - 1.0 = 完全采纳新权重 (最大换手, 信号最快)
  #   - 0.7 = 温和抑制, 单日换手 ~15-20%
  #   - 0.4 = 强抑制, 单日换手 ~5-10% (M25 生产默认, 适合散户)
  #   - 0.2 = 极强抑制, 组合近乎不动
  #   - 0.0 = 完全不动 prev, 相当于关闭 rebalance
  turnover_aversion: 0.4

# ============================================================================
# TradeList 生成参数 (M25 配置化)
# 位置: src/akq_agents/services/portfolio/trade_list.py::TradeListConfig
# 用途: 把 target weights (小数) 翻译成"具体股数 / BUY-SELL-HOLD 清单".
#
# 这一段不改组合本身, 只改"用户看到的每日下单建议"的粒度.
# 散户按自己本金 / 每日可执行力调这几个阈值, 组合层面完全不受影响.
# ============================================================================
trade_list:
  # 假定本金 (元). 决定 target_shares 的量级: target_amount = w × assumed_capital.
  # 这只是"纸面本金"用于计算股数, 不代表真实资金 — 用户需要在 holdings 表手动
  # 校准真实持仓. 建议改成自己实盘规模, 让清单里的股数贴近实际下单量.
  #   - 100000 = 10 万 (默认, 散户小账户)
  #   - 500000 = 50 万
  #   - 1000000 = 100 万
  assumed_capital: 100000.0

  # A 股一手股数. 目标股数按此取整. 不用改.
  lot_size: 100

  # 最小可执行金额 (元). |delta_amount| < 此值的调仓视为"边角料"直接跳过, 变 HOLD.
  # 抬高此值可显著减少每天可执行条数.
  #   - 200 = 老默认, 几乎所有调仓都过阈值
  #   - 2000 = M25 生产默认, 约砍掉 50% 碎单
  #   - 5000 = 极简, 只有大幅调仓才动手
  min_trade_amount: 2000.0

  # 最小权重变化阈值. |target_w - yesterday_w| < 此值且非建仓/清仓 → 强制 HOLD.
  # 比 min_trade_amount 更精细 — 过滤"权重 2.0%→2.1% 这种噪音信号".
  # 建仓 (从 0 持仓变有权重) 和清仓 (从有权重变 0) 不受此约束.
  #   - 0.005 = M25 生产默认, 0.5pct 权重变化 (500 元 / 10 万本金)
  #   - 0.01 = 只有 1pct 以上变化才交易, 更保守
  #   - 0.0 = 关闭此过滤 (回到只看 min_trade_amount)
  min_weight_change: 0.005

backtest:
  engine: akquant
  commission: 0.0003
  slippage: 0.0005
  initial_capital: 1000000
  start_date: "2023-01-01"
  end_date: null

services:
  use_mock_data: false
  use_mock_backtest: false
  strict_real_services: true
