system:
  name: akq-agents
  timezone: Asia/Shanghai
  scheduler:
    factor_refresh_minutes: 30
    backtest_refresh_minutes: 120
    portfolio_refresh_minutes: 180
    daily_advice_hour: 8
    daily_advice_minute: 30

universe:
  market: cn
  symbols:
    - "600519"
    - "000001"
    - "300750"
    - "601318"
    - "600036"
  lookback_days: 120

research:
  benchmark: "000300"
  rebalance_frequency: daily
  top_n_factors: 5
  top_n_symbols: 3
  min_sharpe: 0.8
  max_drawdown: 0.25
  min_ic: -1.0

risk:
  max_single_weight: 0.10
  min_single_weight: 0.005
  max_portfolio_size: 50
  # 注意：M7-B 后真正风控由 services/portfolio/risk_filter.py 在 universe 阶段做
  # （新股/停牌/极价/低流动性硬过滤）。此处 min_liquidity_score 仅作 RiskAgent 兜底
  # 软约束；硬过滤已剔除的低流动性票，这里阈值放到 -3.0 让兜底基本不干预。
  min_liquidity_score: -3.0

backtest:
  engine: akquant
  commission: 0.0003
  slippage: 0.0005
  initial_capital: 1000000
  start_date: "2023-01-01"
  end_date: null

storage:
  state_file: ./runtime_state.yaml

services:
  use_mock_data: false
  use_mock_backtest: false
  enable_llm: false
  strict_real_services: true
