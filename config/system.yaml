system:
  name: akq-agents
  timezone: Asia/Shanghai
  scheduler:
    factor_refresh_minutes: 30
    backtest_refresh_minutes: 120
    portfolio_refresh_minutes: 180
    daily_advice_hour: 8
    daily_advice_minute: 30

universe:
  market: cn
  symbols:
    - "600519"
    - "000001"
    - "300750"
    - "601318"
    - "600036"
  lookback_days: 120

research:
  benchmark: "000300"
  rebalance_frequency: daily
  top_n_factors: 5
  top_n_symbols: 3
  min_sharpe: 0.8
  max_drawdown: 0.25
  min_ic: -1.0

risk:
  max_single_weight: 0.10
  min_single_weight: 0.005
  max_portfolio_size: 50
  # P3 路径下 amount_20 已 zscore，阈值用 -1.5（剔除最差的尾部）；
  # 旧 factor_library 下 liquidity_score = volume/1e6，阈值随便；
  # RiskAgent 兼容两种命名，统一用更宽松值，避免空组合。
  min_liquidity_score: -1.5

backtest:
  engine: akquant
  commission: 0.0003
  slippage: 0.0005
  initial_capital: 1000000
  start_date: "2023-01-01"
  end_date: null

storage:
  state_file: ./runtime_state.yaml
  sqlite_path: ./akq_agents.db

services:
  use_mock_data: false
  use_mock_backtest: false
  enable_llm: false
  strict_real_services: true
