# P4 LLM Agent 层配置
# 参考 docs/superpowers/specs/2026-06-17-p4-llm-agent-design.md
llm:
  gateway:
    base_url: "http://127.0.0.1:18931"
    anthropic_path: "/v1/messages"
    timeout_s: 60
    max_retries: 2
  default_model: "Claude-Opus-4.7"
  analyst:
    enabled: true
    model: "Claude-Opus-4.7"
    max_tokens: 4000
    # 注意：当前网关上游对 Claude 系列禁用了自定义 temperature，必须 1.0
    temperature: 1.0
    context_top_holdings: 20
    context_events_count: 10
  chat:
    enabled: true
    model: "Claude-Opus-4.7"
    max_tokens: 2000
    # 注意：网关上游限制，必须 1.0（详见 analyst）
    temperature: 1.0
    max_iterations: 6
    history_window: 20
  brainstorm:
    # factor.brainstorm 独立配置；20 个 recipe × ~200 token/条会撑爆 chat 的 2000
    model: "Claude-Opus-4.7"
    max_tokens: 6000
    temperature: 1.0
  safety:
    disclaimer_header: "本报告由 LLM 生成，仅供研究参考，不构成投资建议；系统不执行任何交易指令。"
